<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>remjs — collaborative todo</title>
    <link rel="stylesheet" href="/_shared/inspector.css" />
    <style>
      .left {
        font-family: system-ui, sans-serif;
        max-width: 560px;
        margin: 3em auto;
        padding: 0 1em;
        color: #222;
      }
      h1 { margin-bottom: 0.2em; }
      .hint { color: #888; margin-top: 0; }
      form { display: flex; gap: 0.5em; margin: 1em 0; }
      input[type="text"] {
        flex: 1;
        font-size: 1em;
        padding: 0.5em;
        border: 1px solid #bbb;
        border-radius: 4px;
      }
      button {
        font-size: 1em;
        padding: 0.5em 1em;
        cursor: pointer;
        border: 1px solid #aaa;
        background: #f5f5f5;
        border-radius: 4px;
      }
      button:hover { background: #eee; }
      ul { list-style: none; padding: 0; }
      li {
        display: flex;
        align-items: center;
        gap: 0.5em;
        padding: 0.6em;
        border-bottom: 1px solid #eee;
      }
      li.done .text { text-decoration: line-through; color: #888; }
      .text { flex: 1; }
      .remove {
        background: transparent;
        border: none;
        color: #999;
        font-size: 1.1em;
        cursor: pointer;
      }
      .remove:hover { color: #c33; }
      .filters { display: flex; gap: 0.5em; margin-top: 1em; justify-content: center; }
      .filters button.active { background: #4a8; color: white; border-color: #387; }
      .stats { text-align: center; color: #888; margin-top: 1em; font-size: 0.9em; }
    </style>
  </head>
  <body>
    <div class="split">
    <div class="left">
    <h1>remjs todos</h1>
    <p class="hint">Shared across all open tabs. State streamed over WebSocket.</p>
    <form id="add-form">
      <input type="text" id="add-input" placeholder="What needs doing?" autofocus />
      <button type="submit">Add</button>
    </form>
    <ul id="list"></ul>
    <div class="filters">
      <button data-filter="all">All</button>
      <button data-filter="active">Active</button>
      <button data-filter="done">Done</button>
    </div>
    <div class="stats" id="stats"></div>
    </div><!-- /.left -->

    <div class="right" id="inspector"></div>
    </div><!-- /.split -->

    <script type="module" src="./client.js"></script>
  </body>
</html>
